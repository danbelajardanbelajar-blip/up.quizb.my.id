<!-- HISTORY PAGE -->
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">📋 Histori Quiz</h1>
    <p class="text-gray-500 dark:text-gray-400 mt-1" x-text="history.total + ' percobaan tersimpan'"></p>
  </div>

  <!-- Skeleton -->
  <div x-show="history.loading" class="space-y-3">
    <template x-for="i in 6">
      <div class="card p-4 flex items-center gap-4">
        <div class="skeleton w-12 h-12 rounded-xl"></div>
        <div class="flex-1 space-y-2">
          <div class="skeleton h-4 w-48 rounded"></div>
          <div class="skeleton h-3 w-32 rounded"></div>
        </div>
        <div class="skeleton h-6 w-16 rounded-full"></div>
      </div>
    </template>
  </div>

  <!-- List -->
  <div x-show="!history.loading" class="space-y-3">
    <template x-for="attempt in history.list" :key="attempt.id">
      <div class="card p-4 flex items-center gap-4 cursor-pointer hover:shadow-md transition-shadow group"
           @click="navigate('/result/'+attempt.id)">
        <!-- Score Circle -->
        <div class="w-12 h-12 rounded-xl flex items-center justify-center font-bold text-sm flex-shrink-0"
             :class="attempt.score >= (attempt.passing_score||60) ? 'bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400' : 'bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400'">
          <span x-text="attempt.score + '%'"></span>
        </div>

        <!-- Info -->
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-gray-800 dark:text-gray-100 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors truncate" x-text="attempt.quiz_title"></p>
          <div class="flex items-center gap-3 text-xs text-gray-400 mt-0.5">
            <span x-text="formatDate(attempt.completed_at)"></span>
            <span>•</span>
            <span x-text="formatTime(attempt.time_taken||0)"></span>
            <span>•</span>
            <span x-text="attempt.correct_count + '/' + attempt.total_questions + ' benar'"></span>
          </div>
        </div>

        <!-- Status -->
        <div class="flex items-center gap-2 flex-shrink-0">
          <span class="badge text-xs px-3 py-1 rounded-full"
                :class="attempt.passed ? 'badge-success' : 'badge-danger'"
                x-text="attempt.passed ? '✅ Lulus' : '❌ Gagal'"></span>
          <svg class="w-4 h-4 text-gray-300 group-hover:text-primary-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
      </div>
    </template>

    <div x-show="!history.loading && history.list.length===0" class="text-center py-20 text-gray-400">
      <p class="text-5xl mb-4">📭</p>
      <p class="text-lg">Belum ada histori quiz</p>
      <button @click="navigate('/quizzes')" class="mt-4 btn-primary">Mulai Quiz Sekarang</button>
    </div>
  </div>

  <!-- Pagination -->
  <div x-show="!history.loading && history.total > 10" class="flex items-center justify-center gap-2 mt-8">
    <button @click="history.page--;loadHistory()" :disabled="history.page<=1"
            class="px-4 py-2 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 transition-colors">← Prev</button>
    <span class="text-sm text-gray-500 dark:text-gray-400 px-3" x-text="'Halaman ' + history.page + ' dari ' + Math.ceil(history.total/10)"></span>
    <button @click="history.page++;loadHistory()" :disabled="history.page * 10 >= history.total"
            class="px-4 py-2 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 transition-colors">Next →</button>
  </div>
</div>
