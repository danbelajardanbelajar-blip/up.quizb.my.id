<!-- RESULT PAGE -->
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <!-- Loading -->
  <div x-show="result.loading" class="space-y-4">
    <div class="skeleton h-10 w-1/2 mx-auto rounded-xl"></div>
    <div class="skeleton h-48 rounded-2xl"></div>
    <div class="skeleton h-64 rounded-2xl"></div>
  </div>

  <!-- Error / no data -->
  <div x-show="!result.loading && !result.data" class="text-center py-20 text-gray-400">
    <p class="text-5xl mb-4">😕</p>
    <p class="text-lg">Hasil tidak ditemukan</p>
    <button @click="navigate('/quizzes')" class="mt-4 btn-primary">← Ke Daftar Quiz</button>
  </div>

  <!-- Result -->
  <div x-show="!result.loading && result.data" class="animate-slide-up">
    <template x-if="result.data">
      <div>
        <!-- Score Card -->
        <div class="card p-8 text-center mb-6">
          <div class="text-5xl mb-3" x-text="scoreGrade(result.data.score).emoji"></div>
          <h1 class="text-xl font-bold text-gray-700 dark:text-gray-200 mb-1" x-text="scoreGrade(result.data.score).label"></h1>
          <div class="text-7xl font-extrabold my-4" :class="scoreGrade(result.data.score).color"
               x-text="result.data.score + '%'"></div>
          <p class="text-gray-500 dark:text-gray-400 text-sm" x-text="result.data.quiz_title || result.data.quiz?.title"></p>
          <p class="text-xs text-gray-400 mt-1" x-text="'Dimainkan oleh: ' + (result.data.player_name || 'Kamu')"></p>

          <!-- Stats -->
          <div class="grid grid-cols-3 gap-4 mt-6">
            <div class="bg-green-50 dark:bg-green-900/20 rounded-xl p-3">
              <div class="font-bold text-lg text-green-600 dark:text-green-400" x-text="result.data.correct_count || 0"></div>
              <div class="text-xs text-gray-500 mt-0.5">Benar</div>
            </div>
            <div class="bg-red-50 dark:bg-red-900/20 rounded-xl p-3">
              <div class="font-bold text-lg text-red-500 dark:text-red-400"
                   x-text="(result.data.wrong_count ?? (result.data.total_questions - result.data.correct_count)) || 0"></div>
              <div class="text-xs text-gray-500 mt-0.5">Salah</div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-3">
              <div class="font-bold text-lg text-gray-700 dark:text-gray-200" x-text="formatTime(result.data.time_taken||0)"></div>
              <div class="text-xs text-gray-500 mt-0.5">Waktu</div>
            </div>
          </div>

          <!-- Pass/Fail Badge -->
          <div class="mt-5 inline-flex items-center gap-2 px-5 py-2 rounded-full text-sm font-semibold"
               :class="result.data.passed ? 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400' : 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400'">
            <span x-text="result.data.passed ? '✅ Lulus' : '❌ Tidak Lulus'"></span>
            <span class="text-xs opacity-70" x-text="'(Min. ' + (result.data.passing_score||result.data.quiz?.passing_score||60) + '%)'"></span>
          </div>
        </div>

        <!-- Answer Review -->
        <div class="card p-6 mb-6" x-show="result.data.answers && result.data.answers.length > 0">
          <h2 class="font-bold text-gray-900 dark:text-white mb-4">📋 Pembahasan Jawaban</h2>
          <div class="space-y-4">
            <template x-for="(a, idx) in result.data.answers" :key="a.question_id">
              <div class="border border-gray-100 dark:border-gray-800 rounded-xl p-4">
                <!-- Soal -->
                <div class="flex items-start gap-2 mb-3">
                  <span class="text-sm font-bold text-gray-400 flex-shrink-0" x-text="(idx+1)+'.'"></span>
                  <div class="flex-1">
                    <p class="text-sm font-medium text-gray-800 dark:text-gray-200" x-text="a.question_text"></p>
                    <!-- Benar/Salah badge -->
                    <span class="inline-block mt-1 text-xs px-2 py-0.5 rounded-full font-semibold"
                          :class="a.is_correct ? 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400' : 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400'"
                          x-text="a.is_correct ? '✅ Benar' : '❌ Salah'"></span>
                  </div>
                </div>

                <!-- Opsi jawaban -->
                <div class="space-y-2 mt-2" x-show="a.options && a.options.length > 0">
                  <template x-for="opt in a.options" :key="opt.id">
                    <div class="flex items-center gap-2 text-sm px-3 py-2 rounded-lg"
                         :class="{
                           'bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-medium': opt.is_correct,
                           'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400': (opt.id === a.selected_option_id) && !opt.is_correct,
                           'text-gray-500 dark:text-gray-400': !opt.is_correct && (opt.id !== a.selected_option_id),
                         }">
                      <span x-text="opt.is_correct ? '✅' : (opt.id === a.selected_option_id ? '❌' : '○')"></span>
                      <span x-text="opt.option_text"></span>
                    </div>
                  </template>
                </div>

                <!-- Fallback jika tidak ada opsi: tampilkan jawaban teks -->
                <div x-show="!a.options || a.options.length === 0" class="mt-2 text-sm">
                  <p class="text-gray-500 dark:text-gray-400">
                    Jawaban kamu: <span class="font-medium" x-text="a.selected_answer || '(tidak dijawab)'"></span>
                  </p>
                  <p class="text-green-600 dark:text-green-400">
                    Jawaban benar: <span class="font-medium" x-text="a.correct_answer"></span>
                  </p>
                </div>

                <!-- Penjelasan -->
                <p x-show="a.explanation" class="mt-3 text-xs text-gray-500 dark:text-gray-400 bg-blue-50 dark:bg-blue-900/20 rounded-lg px-3 py-2 italic"
                   x-text="'💡 ' + a.explanation"></p>
              </div>
            </template>
          </div>
        </div>

        <!-- Challenge Result Card (hanya muncul jika dari tantangan) -->
        <template x-if="result.challengeId">
          <div class="card p-5 mb-4 border-2 border-purple-200 dark:border-purple-800 bg-purple-50 dark:bg-purple-900/20">
            <div class="flex items-center gap-3 mb-4">
              <span class="text-2xl">⚔️</span>
              <div>
                <h3 class="font-bold text-gray-900 dark:text-white text-sm">Hasil Tantangan</h3>
                <p class="text-xs text-gray-500 dark:text-gray-400" x-text="result.challengeData?.quiz_title || 'Memuat...'"></p>
              </div>
            </div>
            <!-- Menunggu lawan -->
            <template x-if="result.challengeData && result.challengeData.status !== 'completed'">
              <div class="text-center py-3">
                <p class="text-sm text-gray-600 dark:text-gray-400">⏳ Menunggu lawan menyelesaikan quiz...</p>
                <button @click="api.get('challenge.status',{id:result.challengeId}).then(d=>result.challengeData=d)"
                        class="mt-3 text-xs text-primary-500 hover:underline">🔄 Cek status</button>
              </div>
            </template>
            <!-- Selesai — tampilkan pemenang -->
            <template x-if="result.challengeData && result.challengeData.status === 'completed'">
              <div>
                <!-- Pemenang -->
                <div class="text-center mb-4">
                  <template x-if="result.challengeData.is_winner">
                    <div>
                      <p class="text-4xl mb-1">🏆</p>
                      <p class="font-bold text-green-600 dark:text-green-400 text-lg">Kamu Menang!</p>
                    </div>
                  </template>
                  <template x-if="!result.challengeData.is_winner && result.challengeData.winner_id">
                    <div>
                      <p class="text-4xl mb-1">😔</p>
                      <p class="font-bold text-red-500 text-lg" x-text="(result.challengeData.is_challenger ? result.challengeData.challenged_name : result.challengeData.challenger_name) + ' Menang'"></p>
                    </div>
                  </template>
                  <template x-if="!res
