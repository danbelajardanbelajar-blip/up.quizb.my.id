<!-- RESULT PAGE -->
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

  <!-- Tombol kembali ke history siswa (untuk admin/pengajar yang mereview dari public-history) -->
  <template x-if="result.data && result.data.user_id !== user?.id && (user?.role === 'admin' || user?.role === 'pengajar') && publicHistory.filterType === 'user'">
    <button @click="navigate('/public-history')"
            class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400 hover:text-primary-600 dark:hover:text-primary-400 transition-colors mb-5 group">
      <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Kembali ke Histori <span class="font-semibold text-gray-700 dark:text-gray-300" x-text="publicHistory.filterLabel"></span>
    </button>
  </template>

  <!-- Loading -->
  <div x-show="result.loading" class="space-y-4">
    <div class="skeleton h-10 w-1/2 mx-auto rounded-xl"></div>
    <div class="skeleton h-48 rounded-2xl"></div>
    <div class="skeleton h-64 rounded-2xl"></div>
  </div>

  <!-- Error / no data -->
  <div x-show="!result.loading && !result.data" class="text-center py-20 text-gray-400">
    <p class="text-5xl mb-4">😕</p>
    <p class="text-lg">Hasil tidak ditemukan</p>
    <button @click="navigate('/quizzes')" class="mt-4 btn-primary">← Ke Daftar Quiz</button>
  </div>

  <!-- Result -->
  <div x-show="!result.loading && result.data" class="animate-slide-up">
    <template x-if="result.data">
      <div>
        <!-- Score Card -->
        <div class="card p-8 text-center mb-6">
          <div class="text-5xl mb-3" x-text="scoreGrade(result.data.score).emoji"></div>
          <h1 class="text-xl font-bold text-gray-700 dark:text-gray-200 mb-1" x-text="scoreGrade(result.data.score).label"></h1>
          <div class="text-7xl font-extrabold my-4" :class="scoreGrade(result.data.score).color"
               x-text="result.data.score + '%'"></div>
          <p class="text-gray-500 dark:text-gray-400 text-sm" x-text="result.data.quiz_title || result.data.quiz?.title"></p>
          <p class="text-xs text-gray-400 mt-1" x-text="'Dimainkan oleh: ' + (result.data.player_name || 'Kamu')"></p>

          <!-- Stats -->
          <div class="grid grid-cols-3 gap-4 mt-6">
            <div class="bg-green-50 dark:bg-green-900/20 rounded-xl p-3">
              <div class="font-bold text-lg text-green-600 dark:text-green-400" x-text="result.data.correct_count || 0"></div>
              <div class="text-xs text-gray-500 mt-0.5">Benar</div>
            </div>
            <div class="bg-red-50 dark:bg-red-900/20 rounded-xl p-3">
              <div class="font-bold text-lg text-red-500 dark:text-red-400"
                   x-text="(result.data.wrong_count ?? (result.data.total_questions - result.data.correct_count)) || 0"></div>
              <div class="text-xs text-gray-500 mt-0.5">Salah</div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-3">
              <div class="font-bold text-lg text-gray-700 dark:text-gray-200" x-text="formatTime(result.data.time_taken||0)"></div>
              <div class="text-xs text-gray-500 mt-0.5">Waktu</div>
            </div>
          </div>

          <!-- Pass/Fail Badge -->
          <div class="mt-5 inline-flex items-center gap-2 px-5 py-2 rounded-full text-sm font-semibold"
               :class="result.data.passed ? 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400' : 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400'">
            <span x-text="result.data.passed ? '✅ Lulus' : '❌ Tidak Lulus'"></span>
            <span class="text-xs opacity-70" x-text="'(Min. ' + (result.data.passing_score||result.data.quiz?.passing_score||60) + '%)'"></span>
          </div>
        </div>

        <!-- Answer Review -->
        <div class="card p-6 mb-6" x-show="result.data.answers && (result.mode === 'instant' ? result.data.answers.some(a => a.selected_option_id != null || a.selected_answer) : result.data.answers.length > 0)">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-bold text-gray-900 dark:text-white">📋 Pembahasan Jawaban</h2>
            <span x-show="result.mode === 'instant'" class="text-xs text-orange-500 dark:text-orange-400 font-medium bg-orange-50 dark:bg-orange-900/20 px-2 py-1 rounded-lg">
              ⚡ Soal yang dikerjakan saja
            </span>
          </div>
          <div class="space-y-4">
            <template x-for="(a, idx) in (result.mode === 'instant' ? result.data.answers.filter(a => a.selected_option_id != null || a.selected_answer) : result.data.answers)" :key="a.question_id">
              <div class="border border-gray-100 dark:border-gray-800 rounded-xl p-4">
                <div class="flex items-start gap-2 mb-3">
                  <span class="text-sm font-bold text-gray-400 flex-shrink-0" x-text="(idx+1)+'.'"></span>
                  <div class="flex-1">
                    <p class="text-sm font-medium text-gray-800 dark:text-gray-200" x-text="a.question_text"></p>
                    <span class="inline-block mt-1 text-xs px-2 py-0.5 rounded-full font-semibold"
                          :class="a.is_correct ? 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400' : 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400'"
                          x-text="a.is_correct ? '✅ Benar' : '❌ Salah'"></span>
                  </div>
                </div>
                <div class="space-y-2 mt-2" x-show="a.options && a.options.length > 0">
                  <template x-for="opt in a.options" :key="opt.id">
                    <div class="flex items-center gap-2 text-sm px-3 py-2 rounded-lg"
                         :class="{
                           'bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-medium': opt.is_correct,
                           'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400': (opt.id === a.selected_option_id) && !opt.is_correct,
                           'text-gray-500 dark:text-gray-400': !opt.is_correct && (opt.id !== a.selected_option_id),
                         }">
                      <span x-text="opt.is_correct ? '✅' : (opt.id === a.selected_option_id ? '❌' : '○')"></span>
                      <span x-text="opt.option_text"></span>
                    </div>
                  </template>
                </div>
                <div x-show="!a.options || a.options.length === 0" class="mt-2 text-sm">
                  <p class="text-gray-500 dark:text-gray-400">Jawaban kamu: <span class="font-medium" x-text="a.selected_answer || '(tidak dijawab)'"></span></p>
                  <p class="text-green-600 dark:text-green-400">Jawaban benar: <span class="font-medium" x-text="a.correct_answer"></span></p>
                </div>
                <p x-show="a.explanation" class="mt-3 text-xs text-gray-500 dark:text-gray-400 bg-blue-50 dark:bg-blue-900/20 rounded-lg px-3 py-2 italic"
                   x-text="'💡 ' + a.explanation"></p>
              </div>
            </template>
          </div>
        </div>

        <!-- Challenge Result Card -->
        <template x-if="result.challengeId">
          <div class="card p-5 mb-4 border-2 border-purple-200 dark:border-purple-800 bg-purple-50 dark:bg-purple-900/20">
            <div class="flex items-center gap-3 mb-4">
              <span class="text-2xl">⚔️</span>
              <div>
                <h3 class="font-bold text-gray-900 dark:text-white text-sm">Hasil Tantangan</h3>
                <p class="text-xs text-gray-500 dark:text-gray-400" x-text="result.challengeData?.quiz_title || 'Memuat...'"></p>
              </div>
            </div>
            <template x-if="!result.challengeData">
              <div class="text-center py-3">
                <p class="text-sm text-gray-500">Memuat data tantangan...</p>
              </div>
            </template>
            <template x-if="result.challengeData && result.challengeData.status !== 'completed'">
              <div class="text-center py-3">
                <p class="text-sm text-gray-600 dark:text-gray-400">⏳ Menunggu lawan menyelesaikan quiz...</p>
                <button @click="api.get('challenge.status',{id:result.challengeId}).then(d=>result.challengeData=d)"
                        class="mt-3 text-xs text-primary-500 hover:underline">🔄 Cek status</button>
              </div>
            </template>
            <template x-if="result.challengeData && result.challengeData.status === 'completed'">
              <div>
                <div class="text-center mb-4">
                  <template x-if="result.challengeData.is_winner">
                    <div><p class="text-4xl mb-1">🏆</p><p class="font-bold text-green-600 dark:text-green-400 text-lg">Kamu Menang!</p></div>
                  </template>
                  <template x-if="!result.challengeData.is_winner && result.challengeData.winner_id">
                    <div>
                      <p class="text-4xl mb-1">😔</p>
                      <p class="font-bold text-red-500 text-lg"
                         x-text="(result.challengeData.is_challenger ? result.challengeData.challenged_name : result.challengeData.challenger_name) + ' Menang'"></p>
                    </div>
                  </template>
                  <template x-if="!result.challengeData.winner_id">
                    <div><p class="text-4xl mb-1">🤝</p><p class="font-bold text-gray-600 dark:text-gray-300 text-lg">Seri!</p></div>
                  </template>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div class="bg-white dark:bg-gray-900 rounded-xl p-3 text-center border"
                       :class="result.challengeData.is_challenger ? 'border-primary-300' : 'border-gray-200 dark:border-gray-700'">
                    <p class="text-xs font-semibold text-gray-500 mb-1" x-text="result.challengeData.challenger_name"></p>
                    <p class="text-2xl font-extrabold text-primary-600 dark:text-primary-400" x-text="(result.challengeData.challenger_score ?? '?') + '%'"></p>
                    <p class="text-xs text-gray-400 mt-0.5" x-text="result.challengeData.challenger_time ? formatTime(result.challengeData.challenger_time) : '-'"></p>
                  </div>
                  <div class="bg-white dark:bg-gray-900 rounded-xl p-3 text-center border"
                       :class="!result.challengeData.is_challenger ? 'border-primary-300' : 'border-gray-200 dark:border-gray-700'">
                    <p class="text-xs font-semibold text-gray-500 mb-1" x-text="result.challengeData.challenged_name"></p>
                    <p class="text-2xl font-extrabold text-primary-600 dark:text-primary-400" x-text="(result.challengeData.challenged_score ?? '?') + '%'"></p>
                    <p class="text-xs text-gray-400 mt-0.5" x-text="result.challengeData.challenged_time ? formatTime(result.challengeData.challenged_time) : '-'"></p>
                  </div>
                </div>
              </div>
            </template>
            <button @click="navigate('/challenges')" class="mt-4 w-full py-2 text-xs text-purple-600 dark:text-purple-400 hover:underline">
              Lihat semua tantangan →
            </button>
          </div>
        </template>

        <!-- Kumpulkan ke Tugas (disembunyikan saat admin/pengajar mereview hasil orang lain) -->
        <div x-show="result.assignId && !(result.data?.user_id !== user?.id && (user?.role === 'admin' || user?.role === 'pengajar'))"
             class="card p-5 mb-4 border-2 border-primary-200 dark:border-primary-800 bg-primary-50 dark:bg-primary-900/20">
          <div class="flex items-center gap-3 mb-3">
            <span class="text-2xl">📋</span>
            <div>
              <h3 class="font-bold text-gray-900 dark:text-white text-sm">Kumpulkan ke Tugas</h3>
              <p class="text-xs text-gray-500 dark:text-gray-400">Klik tombol di bawah untuk mengumpulkan hasil quiz ini sebagai jawaban tugas.</p>
            </div>
          </div>
          <div x-show="result.assignSubmitted" class="flex items-center gap-2 text-green-600 dark:text-green-400 font-semibold text-sm">
            <span>✅</span> Tugas berhasil dikumpulkan!
          </div>
          <div x-show="result.assignError && !result.assignSubmitted" class="text-red-500 text-sm mb-2" x-text="result.assignError"></div>
          <button x-show="!result.assignSubmitted"
                  @click="submitToAssignment(result.assignId, result.data?.id)"
                  class="btn-primary w-full py-2.5 text-sm"
                  :disabled="result.assignSubmitting">
            <span x-show="result.assignSubmitting" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin inline-block mr-2"></span>
            📤 Kumpulkan Tugas Sekarang
          </button>
        </div>

        <!-- Actions: berbeda tergantung konteks (viewer vs pemilik) -->
        <template x-if="result.data?.user_id !== user?.id && (user?.role === 'admin' || user?.role === 'pengajar')">
          <!-- Tampilan untuk admin/pengajar yang mereview hasil siswa -->
          <div class="flex flex-col sm:flex-row gap-3">
            <button @click="navigate('/public-history')"
                    class="btn-secondary flex-1 justify-center py-2.5">← Kembali ke Histori Siswa</button>
            <button @click="navigate('/quiz/' + (result.data.quiz_id||result.data.quiz?.id))"
                    class="btn-primary flex-1 justify-center py-2.5">📋 Lihat Quiz</button>
          </div>
        </template>
        <template x-if="!(result.data?.user_id !== user?.id && (user?.role === 'admin' || user?.role === 'pengajar'))">
          <!-- Tampilan normal untuk pemilik attempt -->
          <div class="flex flex-col sm:flex-row gap-3">
            <button
              @click="navigate(result.assignId ? '/play/' + (result.data.quiz_id||result.data.quiz?.id) + (result.mode ? '?mode=' + result.mode + '&assign=' + result.assignId : '?assign=' + result.assignId) : '/quiz/' + (result.data.quiz_id||result.data.quiz?.id))"
              class="btn-secondary flex-1 justify-center py-2.5">🔄 Coba Lagi</button>
            <button @click="navigate('/quizzes')" class="btn-primary flex-1 justify-center py-2.5">📝 Quiz Lain</button>
            <button @click="navigate('/leaderboard')" class="flex-1 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 text-sm font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">🏆 Leaderboard</button>
          </div>
        </template>

      </div>
    </template>
  </div>
</div>
