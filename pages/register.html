<!-- REGISTER PAGE -->
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md animate-slide-up">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl flex items-center justify-center shadow-xl mx-auto mb-4">
        <span class="text-white font-bold text-2xl">Q</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Buat Akun QuizB</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">Gratis selamanya 🎉</p>
    </div>
    <div class="card p-8">
      <!-- Google Register Button -->
      <button type="button" @click="registerWithGoogle()" class="btn-secondary w-full py-3 text-base flex items-center justify-center gap-2 mb-6">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Daftar dengan Google
      </button>

      <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400">atau</span>
        </div>
      </div>

      <form @submit.prevent="register()" class="space-y-4">
        <div x-show="registerForm.error" class="flex items-center gap-2 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-600 dark:text-red-400">
          <span>⚠️</span><span x-text="registerForm.error"></span>
        </div>
        <div>
          <label class="form-label" for="reg-name">Nama Lengkap</label>
          <input id="reg-name" type="text" x-model="registerForm.name" class="form-input" placeholder="Nama kamu" required />
        </div>
        <div>
          <label class="form-label" for="reg-email">Email</label>
          <input id="reg-email" type="email" x-model="registerForm.email" class="form-input" placeholder="kamu@email.com" required />
        </div>
        <div>
          <label class="form-label" for="reg-password">Password</label>
          <input id="reg-password" type="password" x-model="registerForm.password" class="form-input" placeholder="Min. 6 karakter" required />
        </div>
        <div>
          <label class="form-label" for="reg-confirm">Konfirmasi Password</label>
          <input id="reg-confirm" type="password" x-model="registerForm.password_confirm" class="form-input" placeholder="Ulangi password" required />
        </div>
        <button type="submit" class="btn-primary w-full py-3 text-base" :disabled="registerForm.loading">
          <span x-show="registerForm.loading" class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2"></span>
          <span x-text="registerForm.loading ? 'Mendaftar...' : '✨ Daftar Sekarang'"></span>
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
        Sudah punya akun?
        <a href="#/login" @click.prevent="navigate('/login')" class="text-primary-600 dark:text-primary-400 font-semibold hover:underline">Masuk</a>
      </p>
    </div>
  </div>
</div>
