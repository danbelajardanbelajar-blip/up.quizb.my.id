<div x-show="!admin.loading && true" class="animate-fade-in">

    <!-- === LIST VIEW === -->
    <div x-show="admin.quizzesView === 'list'">
      <div class="flex items-center justify-between gap-3 mb-4 flex-wrap">
        <div class="relative flex-1 min-w-[200px] max-w-sm">
          <span class="absolute inset-y-0 left-3 flex items-center text-gray-400 pointer-events-none">🔍</span>
          <input type="search"
                 :value="admin.quizzesSearch"
                 @input="onAdminQuizSearch($event.target.value)"
                 placeholder="Cari judul atau kategori..."
                 class="form-input pl-9 py-2 text-sm w-full" />
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
          <p class="text-sm text-gray-500 dark:text-gray-400 whitespace-nowrap" x-text="admin.quizzesTotal + ' quiz'"></p>
          <button @click="openAdminModal('quiz_create',{is_published:1,difficulty:'medium',time_limit:600,passing_score:60})" class="btn-primary text-sm px-4 py-2">+ Tambah Quiz</button>
        </div>
      </div>
      <div class="card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead><tr>
              <th @click="sortAdmin('quizzes','title')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800">Judul <span class="text-gray-400 text-xs" x-text="sortIcon('quizzes','title')"></span></th>
              <th @click="sortAdmin('quizzes','category_name')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800">Kategori <span class="text-gray-400 text-xs" x-text="sortIcon('quizzes','category_name')"></span></th>
              <th @click="sortAdmin('quizzes','question_count')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800">Soal <span class="text-gray-400 text-xs" x-text="sortIcon('quizzes','question_count')"></span></th>
              <th @click="sortAdmin('quizzes','attempt_count')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800">Percobaan <span class="text-gray-400 text-xs" x-text="sortIcon('quizzes','attempt_count')"></span></th>
              <th>Status</th><th>Aksi</th>
            </tr></thead>
            <tbody>
              <template x-for="q in sortedAdmin('quizzes', admin.quizzes)" :key="q.id">
                <tr>
                  <td class="font-medium" x-text="q.title"></td>
                  <td x-text="q.category_name||'-'"></td>
                  <td x-text="q.question_count"></td>
                  <td x-text="q.attempt_count"></td>
                  <td>
                    <span class="badge text-xs" :class="q.is_published?'badge-success':'badge-warning'"
                          x-text="q.is_published ? 'Aktif' : 'Draft'"></span>
                  </td>
                  <td>
                    <div class="flex items-center gap-2">
                      <button @click="openAdminModal('quiz_edit', q)" class="text-xs text-blue-500 hover:underline">Edit Info</button>
                      <button @click="openQuizQuestions(q)" class="text-xs text-primary-600 dark:text-primary-400 hover:underline font-medium">Kelola Soal</button>
                      <button @click="deleteAdminItem('quiz', q.id)" class="text-xs text-red-500 hover:underline">Hapus</button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div x-show="admin.quizzes.length === 0 && !admin.loading" class="text-center py-12 text-gray-400">
          <p class="text-4xl mb-2">🔍</p>
          <p class="text-sm" x-show="admin.quizzesSearch">Tidak ada quiz yang cocok dengan "<span x-text="admin.quizzesSearch" class="font-medium text-gray-600 dark:text-gray-300"></span>"</p>
          <p class="text-sm" x-show="!admin.quizzesSearch">Belum ada quiz</p>
        </div>
      </div>
      <!-- Pagination quizzes -->
      <div x-show="admin.quizzesTotal > 15" class="flex items-center justify-center gap-2 mt-5">
        <button @click="admin.quizzesPage--; loadAdminTab('quizzes')" :disabled="admin.quizzesPage<=1"
                class="px-4 py-2 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 transition-colors">← Prev</button>
        <span class="text-sm text-gray-500 dark:text-gray-400 px-3"
              x-text="'Halaman ' + admin.quizzesPage + ' dari ' + Math.max(1, Math.ceil(admin.quizzesTotal/15))"></span>
        <button @click="admin.quizzesPage++; loadAdminTab('quizzes')" :disabled="admin.quizzesPage*15 >= admin.quizzesTotal"
                class="px-4 py-2 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 transition-colors">Next →</button>
      </div>
    </div>

    <!-- === QUESTIONS SUB-VIEW === -->
    <div x-show="admin.quizzesView === 'questions'">
      <!-- Breadcrumb -->
      <div class="flex items-center gap-3 mb-5 flex-wrap">
        <button @click="backFromQuestions()"
                class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 border border-gray-200 dark:border-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
          ← <span x-text="admin.questionsSourceTab === 'content' ? 'Kembali ke Konten' : 'Kembali ke Daftar Quiz'"></span>
        </button>
        <div class="flex-1">
          <p class="text-xs text-gray-400 mb-0.5">Kelola Soal</p>
          <h2 class="font-semibold text-gray-800 dark:text-gray-100" x-text="admin.questionsQuizTitle"></h2>
        </div>
        <span class="text-sm text-gray-400" x-text="admin.questionsTotal + ' soal'"></span>
      </div>

      <!-- Toolbar -->
      <div class="flex items-center gap-3 mb-4 flex-wrap">
        <div class="relative flex-1 min-w-[200px] max-w-xs">
          <span class="absolute inset-y-0 left-3 flex items-center text-gray-400 pointer-events-none">🔍</span>
          <input type="search"
                 :value="admin.questionsSearch"
                 @input="onAdminQuestionSearch($event.target.value)"
                 placeholder="Cari teks soal..."
                 class="form-input pl-9 py-2 text-sm w-full" />
        </div>
        <label class="flex items-center gap-2 text-sm px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer transition-colors flex-shrink-0">
          <input type="checkbox"
                 @change="toggleSelectAllQuestions($event.target.checked)"
                 :checked="admin.questionsAll.length > 0 && admin.questionsAll.every(q => q._sel)"
                 class="accent-primary-600" />
          <span>Semua</span>
        </label>
        <div class="flex items-center gap-2 flex-shrink-0 ml-auto flex-wrap">
          <button @click="openImportFileModal()" class="btn-secondary text-sm px-3 py-2 flex items-center gap-1.5">📥 Import File</button>
          <button @click="openImportQuizbModal()" class="btn-secondary text-sm px-3 py-2 flex items-center gap-1.5">🌐 Import QuizB</button>
          <button @click="deleteSelectedQuestions()"
                  :disabled="selectedAdminQuestionsCount === 0"
                  class="btn-danger text-sm px-3 py-2 flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed">
            🗑️ Hapus Terpilih
          </button>
          <button @click="admin.form = buildQuestionForm(); openAdminModal('question_create')"
                  class="btn-primary text-sm px-4 py-2">+ Tambah Soal</button>
        </div>
      </div>
      <div x-show="selectedAdminQuestionsCount > 0" class="text-sm text-gray-500 mb-3">
        <span class="font-semibold" x-text="selectedAdminQuestionsCount"></span> soal terpilih.
        <button @click="toggleSelectAllQuestions(false)" class="underline ml-2">Bersihkan pilihan</button>
      </div>

      <!-- Questions display in card format -->
      <div class="space-y-3">
        <template x-for="(q, idx) in sortedAdmin('questions', admin.questionsAll)" :key="q.id">
          <div class="border border-gray-200 dark:border-gray-800 rounded-lg p-4 hover:bg-gray-50 dark:hover:bg-gray-900/50 transition-colors">
            <!-- Header dengan checkbox dan nomor -->
            <div class="flex items-start gap-3 mb-3">
              <input type="checkbox" x-model="q._sel" class="accent-primary-600 mt-1 flex-shrink-0" />
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span class="inline-block px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-xs font-medium text-gray-600 dark:text-gray-400">
                    Soal <span x-text="idx + 1"></span>
                  </span>
                  <span class="inline-block px-2 py-0.5 rounded-full bg-primary-50 dark:bg-primary-900/30 text-xs font-medium text-primary-600 dark:text-primary-400">
                    <span x-text="q.points"></span> poin
                  </span>
                  <span class="inline-block px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-700 text-xs font-medium text-gray-500 dark:text-gray-400" x-text="q.type === 'true_false' ? 'Benar/Salah' : 'Pilihan Ganda'"></span>
                </div>
                <p class="text-sm font-semibold text-gray-900 dark:text-white break-words leading-relaxed"
                   dir="auto"
                   x-text="q.question_text"></p>
                <p x-show="q.explanation"
                   class="text-xs text-gray-500 dark:text-gray-400 italic mt-2 leading-relaxed"
                   dir="auto"
                   x-text="'💡 ' + q.explanation"></p>
              </div>
            </div>

            <!-- Pilihan jawaban -->
            <div class="ml-7 space-y-1.5 mb-3">
              <template x-for="(opt, oidx) in q.options" :key="opt.id">
                <div class="flex items-start gap-2 p-2 rounded-lg"
                     :class="opt.is_correct
                       ? 'bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800'
                       : 'bg-gray-50 dark:bg-gray-800/50'">
                  <span class="flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold mt-0.5"
                        :class="opt.is_correct
                          ? 'border-green-500 bg-green-500 text-white'
                          : 'border-gray-300 dark:border-gray-600 text-gray-400'">
                    <span x-text="String.fromCharCode(65 + oidx)"></span>
                  </span>
                  <span class="flex-1 text-sm break-words leading-relaxed"
                        dir="auto"
                        :class="opt.is_correct
                          ? 'text-green-700 dark:text-green-300 font-medium'
                          : 'text-gray-700 dark:text-gray-300'">
                    <span x-text="opt.option_text"></span>
                    <span x-show="opt.is_correct" class="inline-flex items-center gap-0.5 ml-2 text-xs font-semibold text-green-600 dark:text-green-400">✓ Benar</span>
                  </span>
                </div>
              </template>
            </div>

            <!-- Aksi -->
            <div class="flex items-center justify-end gap-2 ml-7 pt-2 border-t border-gray-100 dark:border-gray-800">
              <button @click="openAdminModal('question_edit', {...q, options: q.options.map(o=>({...o}))})"
                      class="text-xs px-3 py-1.5 rounded-lg text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors">
                ✏️ Edit
              </button>
              <button @click="deleteAdminItem('question', q.id)"
                      class="text-xs px-3 py-1.5 rounded-lg text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors">
                🗑️ Hapus
              </button>
            </div>
          </div>
        </template>
      </div>
        <div x-show="admin.questionsAll.length === 0 && !admin.loading" class="text-center py-12 text-gray-400">
          <p class="text-4xl mb-3">❓</p>
          <p class="text-sm" x-show="admin.questionsSearch">Tidak ada soal yang cocok dengan pencarian</p>
          <p class="text-sm" x-show="!admin.questionsSearch">Quiz ini belum memiliki soal</p>
          <button x-show="!admin.questionsSearch"
                  @click="admin.form = buildQuestionForm(); openAdminModal('question_create')"
                  class="mt-3 btn-primary text-sm px-4 py-2">+ Tambah Soal Pertama</button>
        </div>
      </div>

      <!-- Pagination questions -->
      <div x-show="admin.questionsTotal > 20" class="flex items-center justify-center gap-2 mt-5">
        <button @click="admin.questionsPage--; reloadQuizQuestions()" :disabled="admin.questionsPage<=1"
                class="px-4 py-2 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 transition-colors">← Prev</button>
        <span class="text-sm text-gray-500 dark:text-gray-400 px-3"
              x-text="'Halaman ' + admin.questionsPage + ' dari ' + Math.max(1, Math.ceil(admin.questionsTotal/20))"></span>
        <button @click="admin.questionsPage++; reloadQuizQuestions()" :disabled="admin.questionsPage*20 >= admin.questionsTotal"
                class="px-4 py-2 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 transition-colors">Next →</button>
      </div>
    </div>


  <!-- ===== CATEGORIES TAB ===== -->
