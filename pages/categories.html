<!-- CATEGORIES PAGE -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">📂 Semua Kategori</h1>
    <p class="text-gray-500 dark:text-gray-400 mt-1">Temukan topik yang kamu minati</p>
  </div>

  <!-- Skeleton -->
  <div x-show="categories.loading" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <template x-for="i in 8">
      <div class="card p-6 space-y-3">
        <div class="skeleton h-8 w-8 rounded-lg"></div>
        <div class="skeleton h-5 w-2/3 rounded"></div>
        <div class="skeleton h-4 w-full rounded"></div>
      </div>
    </template>
  </div>

  <!-- Grid -->
  <div x-show="!categories.loading" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <template x-for="cat in categories.list" :key="cat.id">
      <div class="card card-hover p-6 cursor-pointer group"
           @click="quizzes.categoryId=cat.id; quizzes.search=''; navigate('/quizzes')">
        <div class="flex items-start justify-between mb-4">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl"
               :style="'background:' + (cat.color||'#6366f1') + '20'">
            <span x-text="cat.icon || '📚'"></span>
          </div>
          <span class="badge badge-primary text-xs" x-text="cat.quiz_count + ' quiz'"></span>
        </div>
        <h2 class="font-bold text-gray-800 dark:text-gray-100 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors mb-2" x-text="cat.name"></h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-2" x-text="cat.description || 'Kuis interaktif di kategori ini'"></p>
        <div class="mt-4 flex items-center text-xs font-medium text-primary-600 dark:text-primary-400 group-hover:gap-1 transition-all">
          Mulai kuis <span class="ml-1">→</span>
        </div>
      </div>
    </template>
  </div>

  <div x-show="!categories.loading && categories.list.length===0" class="text-center py-20 text-gray-400">
    <p class="text-5xl mb-4">📭</p>
    <p class="text-lg">Belum ada kategori</p>
  </div>
</div>
