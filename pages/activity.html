<!-- ACTIVITY PAGE -->
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

  <!-- Header -->
  <div class="text-center mb-10">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">🌐 Aktivitas Publik</h1>
    <p class="text-gray-500 dark:text-gray-400 mt-2">Hasil quiz terbaru dari seluruh pengguna</p>
  </div>

  <!-- Loading Skeleton -->
  <div x-show="activity.loading" class="space-y-4">
    <template x-for="i in 8">
      <div class="card p-4 flex items-center gap-4">
        <div class="skeleton w-10 h-10 rounded-full flex-shrink-0"></div>
        <div class="flex-1 space-y-2">
          <div class="skeleton h-4 w-40 rounded"></div>
          <div class="skeleton h-3 w-56 rounded"></div>
          <div class="skeleton h-3 w-24 rounded"></div>
        </div>
        <div class="skeleton h-8 w-14 rounded-lg flex-shrink-0"></div>
      </div>
    </template>
  </div>

  <!-- Feed -->
  <div x-show="!activity.loading" class="space-y-4">

    <!-- Empty state -->
    <div x-show="activity.list.length === 0" class="text-center py-20 text-gray-400">
      <p class="text-5xl mb-4">📭</p>
      <p class="text-lg font-medium">Belum ada aktivitas</p>
      <p class="text-sm mt-1">Jadilah yang pertama menyelesaikan quiz!</p>
      <button @click="navigate('/quizzes')" class="btn-primary mt-6 px-6 py-2.5 text-sm">🚀 Mulai Quiz</button>
    </div>

    <template x-for="item in activity.list" :key="item.id">
      <div class="card p-4 sm:p-5 flex items-start gap-4 hover:shadow-md transition-shadow duration-200">

        <!-- Avatar -->
        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm flex-shrink-0 shadow-sm"
             :style="'background: hsl(' + (item.user_id * 47 % 360) + ',58%,52%)'">
          <span x-text="item.user_name?.charAt(0)?.toUpperCase()"></span>
        </div>

        <!-- Content -->
        <div class="flex-1 min-w-0">
          <!-- Name + action -->
          <p class="text-sm text-gray-800 dark:text-gray-200 leading-snug flex flex-wrap items-baseline gap-x-1 gap-y-0.5">
            <!-- Nama user — klik → public history by user -->
            <button @click="openPublicHistory('user', item.user_id, item.user_name)"
                    class="font-semibold hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
              <span x-text="item.user_name"></span>
            </button>
            <span class="text-gray-500 dark:text-gray-400 text-xs">menyelesaikan</span>
            <!-- Judul quiz — klik → public history by quiz -->
            <button @click="openPublicHistory('quiz', item.quiz_id, item.quiz_title)"
                    class="font-semibold text-primary-600 dark:text-primary-400 hover:underline truncate max-w-[180px] sm:max-w-xs inline-block align-bottom"
                    x-text="item.quiz_title"></button>
          </p>

          <!-- Category + time + mode -->
          <div class="flex items-center gap-2 mt-1.5 flex-wrap">
            <span x-show="item.category_name"
                  class="inline-flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400">
              <span x-text="item.category_icon || '📂'"></span>
              <span x-text="item.category_name"></span>
            </span>
            <span class="text-xs text-gray-300 dark:text-gray-600" x-show="item.category_name">•</span>
            <span class="text-xs text-gray-400" x-text="formatRelative(item.completed_at)"></span>
            <span class="text-xs text-gray-300 dark:text-gray-600">•</span>
            <!-- Mode — klik → public history by mode -->
            <button @click="openPublicHistory('mode', item.mode, {exam:'Ujian',instant:'Instan',end:'Akhir',challenge:'Tantangan'}[item.mode] || item.mode)"
                    class="inline-flex items-center gap-0.5 text-xs px-1.5 py-0.5 rounded-full transition-colors"
                    :class="{
                      'bg-blue-50 dark:bg-blue-900/20 text-blue-500 hover:bg-blue-100':         item.mode === 'exam',
                      'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 hover:bg-yellow-100': item.mode === 'instant',
                      'bg-purple-50 dark:bg-purple-900/20 text-purple-500 hover:bg-purple-100': item.mode === 'end',
                      'bg-red-50 dark:bg-red-900/20 text-red-500 hover:bg-red-100':             item.mode === 'challenge',
                      'bg-gray-100 dark:bg-gray-800 text-gray-500 hover:bg-gray-200':           !['exam','instant','end','challenge'].includes(item.mode),
                    }">
              <span x-text="{exam:'📝',instant:'⚡',end:'🎓',challenge:'⚔️'}[item.mode] || '🎮'"></span>
              <span x-text="{exam:'Ujian',instant:'Instan',end:'Akhir',challenge:'Tantangan'}[item.mode] || item.mode"></span>
            </button>
          </div>

          <!-- Stats bar -->
          <div class="mt-2.5 flex items-center gap-3">
            <!-- Progress bar -->
            <div class="flex-1 max-w-[160px] sm:max-w-xs">
              <div class="flex justify-between text-xs text-gray-400 mb-1">
                <span x-text="item.correct_answers + '/' + item.total_questions + ' benar'"></span>
                <span x-text="item.percent + '%'"
                      :class="{
                        'text-green-500 font-semibold': item.badge === 'perfect',
                        'text-blue-500 font-semibold':  item.badge === 'good',
                        'text-yellow-500':              item.badge === 'ok',
                        'text-red-400':                 item.badge === 'low'
                      }"></span>
              </div>
              <div class="h-1.5 rounded-full bg-gray-100 dark:bg-gray-800 overflow-hidden">
                <div class="h-full rounded-full transition-all duration-700"
                     :style="'width:' + item.percent + '%'"
                     :class="{
                       'bg-green-500': item.badge === 'perfect',
                       'bg-blue-500':  item.badge === 'good',
                       'bg-yellow-400': item.badge === 'ok',
                       'bg-red-400':   item.badge === 'low'
                     }"></div>
              </div>
            </div>

            <!-- Time taken -->
            <span x-show="item.time_taken > 0"
                  class="text-xs text-gray-400 whitespace-nowrap"
                  x-text="'⏱ ' + (item.time_taken >= 60 ? Math.floor(item.time_taken/60) + 'm ' + (item.time_taken%60) + 'd' : item.time_taken + 'd')"></span>
          </div>
        </div>

        <!-- Score badge -->
        <div class="flex-shrink-0 text-center">
          <div class="w-14 h-14 rounded-xl flex flex-col items-center justify-center shadow-sm border"
               :class="{
                 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800': item.badge === 'perfect',
                 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800':    item.badge === 'good',
                 'bg-yellow-50 dark:bg-yellow-900/20 border-yellow-200 dark:border-yellow-800': item.badge === 'ok',
                 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800':        item.badge === 'low'
               }">
            <span class="text-xs font-bold"
                  :class="{
                    'text-green-600 dark:text-green-400': item.badge === 'perfect',
                    'text-blue-600 dark:text-blue-400':  item.badge === 'good',
                    'text-yellow-600 dark:text-yellow-400': item.badge === 'ok',
                    'text-red-500 dark:text-red-400':    item.badge === 'low'
                  }"
                  x-text="item.score"></span>
            <span class="text-[10px] text-gray-400 mt-0.5">pts</span>
          </div>
          <span class="text-xs mt-1 block"
                x-text="item.badge === 'perfect' ? '🏆' : (item.badge === 'good' ? '🎯' : (item.badge === 'ok' ? '👍' : '📖'))"></span>
        </div>

      </div>
    </template>

    <!-- Load More -->
    <div x-show="activity.list.length > 0 && activity.list.length < activity.total"
         class="text-center pt-4">
      <button @click="loadMoreActivity()"
              :disabled="activity.loadingMore"
              class="px-6 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-50 transition-colors">
        <span x-show="!activity.loadingMore">Muat lebih banyak</span>
        <span x-show="activity.loadingMore" class="flex items-center gap-2">
          <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
          </svg>
          Memuat...
        </span>
      </button>
    </div>

    <!-- End of feed -->
    <div x-show="activity.list.length > 0 && activity.list.length >= activity.total && activity.total > 0"
         class="text-center py-6 text-xs text-gray-300 dark:text-gray-700">
      — Semua aktivitas telah ditampilkan —
    </div>

  </div>
</div>
