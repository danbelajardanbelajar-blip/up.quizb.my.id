<!-- CHALLENGES PAGE -->
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">⚔️ Tantangan</h1>
    <button @click="loadChallenges()" class="btn-secondary text-sm px-4 py-2">🔄 Refresh</button>
  </div>

  <!-- Loading -->
  <div x-show="challenge.loading" class="space-y-3">
    <div class="skeleton h-20 rounded-xl"></div>
    <div class="skeleton h-20 rounded-xl"></div>
  </div>

  <div x-show="!challenge.loading">

    <!-- ===== TANTANGAN MASUK ===== -->
    <div class="mb-8">
      <h2 class="text-base font-semibold text-gray-700 dark:text-gray-300 mb-3 flex items-center gap-2">
        📩 Tantangan Masuk
        <span x-show="challenge.pendingCount > 0"
              class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-red-500 text-white text-xs font-bold"
              x-text="challenge.pendingCount"></span>
      </h2>

      <div x-show="challenge.incoming.length === 0" class="text-center py-10 text-gray-400 bg-gray-50 dark:bg-gray-800/50 rounded-2xl">
        <p class="text-3xl mb-2">📭</p>
        <p class="text-sm">Tidak ada tantangan masuk saat ini</p>
      </div>

      <div class="space-y-3">
        <template x-for="c in challenge.incoming" :key="c.id">
          <div class="card p-5 border-l-4 border-purple-400">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span class="w-7 h-7 rounded-full bg-purple-100 dark:bg-purple-900/40 text-purple-600 dark:text-purple-400 flex items-center justify-center text-xs font-bold flex-shrink-0"
                        x-text="c.challenger_name.charAt(0).toUpperCase()"></span>
                  <p class="text-sm font-semibold text-gray-900 dark:text-white truncate" x-text="c.challenger_name"></p>
                  <span class="text-xs text-gray-400">menantangmu</span>
                </div>
                <p class="text-sm font-medium text-primary-600 dark:text-primary-400 mb-1" x-text="'🎯 ' + c.quiz_title"></p>
                <div class="flex items-center gap-3 text-xs text-gray-400">
                  <span x-text="(c.total_questions || '?') + ' soal'"></span>
                  <span x-show="c.message" class="italic" x-text="'\"' + c.message + '\"'"></span>
                </div>
                <p class="text-xs text-gray-300 dark:text-gray-600 mt-1"
                   x-text="'Berakhir: ' + new Date(c.expires_at).toLocaleDateString('id-ID', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})"></p>
              </div>
              <div class="flex flex-col gap-2 flex-shrink-0">
                <button @click="acceptChallenge(c.id, c.quiz_id)"
                        class="px-4 py-1.5 bg-purple-600 hover:bg-purple-700 text-white text-xs font-semibold rounded-lg transition-colors">
                  ✅ Terima
                </button>
                <button @click="declineChallenge(c.id)"
                        class="px-4 py-1.5 border border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 text-xs font-semibold rounded-lg hover:border-red-400 hover:text-red-500 transition-colors">
                  ❌ Tolak
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- ===== RIWAYAT TANTANGAN DITERIMA ===== -->
    <div class="mb-8" x-show="challenge.received.length > 0">
      <h2 class="text-base font-semibold text-gray-700 dark:text-gray-300 mb-3">📋 Riwayat Tantangan Diterima</h2>

      <div class="space-y-3">
        <template x-for="c in challenge.received" :key="'r'+c.id">
          <div class="card p-5"
               :class="c.status === 'playing' ? 'border-l-4 border-blue-400' : ''">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span class="w-7 h-7 rounded-full bg-purple-100 dark:bg-purple-900/40 text-purple-600 dark:text-purple-400 flex items-center justify-center text-xs font-bold flex-shrink-0"
                        x-text="c.challenger_name.charAt(0).toUpperCase()"></span>
                  <p class="text-sm font-semibold text-gray-900 dark:text-white truncate" x-text="c.challenger_name"></p>
                  <span class="text-xs text-gray-400">menantangmu</span>
                </div>
                <p class="text-sm font-medium text-primary-600 dark:text-primary-400 mb-1" x-text="'🎯 ' + c.quiz_title"></p>
                <div class="flex items-center gap-3 text-xs text-gray-400 flex-wrap">
                  <span x-show="c.message" class="italic" x-text="'\"' + c.message + '\"'"></span>
                  <span x-text="new Date(c.created_at).toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'})"></span>
                </div>
                <!-- Skor hasil jika selesai -->
                <div x-show="c.status === 'completed'" class="mt-1.5 flex items-center gap-3 text-xs text-gray-500 dark:text-gray-400">
                  <span x-show="c.my_score !== null" x-text="'Skormu: ' + c.my_score"></span>
                  <span x-show="c.challenger_score !== null" x-text="'Skor penantang: ' + c.challenger_score"></span>
                </div>
              </div>
              <div class="flex flex-col items-end gap-2 flex-shrink-0">
                <!-- Badge status -->
                <span x-show="c.status === 'playing'"
                      class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400">
                  🎮 Berlangsung
                </span>
                <span x-show="c.status === 'declined'"
                      class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400">
                  ❌ Ditolak
                </span>
                <span x-show="c.status === 'expired'"
                      class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-500 dark:bg-gray-800 dark:text-gray-400">
                  ⌛ Kedaluwarsa
                </span>
                <template x-if="c.status === 'completed'">
                  <div>
                    <span x-show="c.winner_id && c.winner_id == user?.id"
                          class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400">
                      🏆 Kamu Menang!
                    </span>
                    <span x-show="c.winner_id && c.winner_id != user?.id"
                          class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400"
                          x-text="'😔 ' + c.winner_name + ' Menang'">
                    </span>
                    <span x-show="!c.winner_id"
                          class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400">
                      🤝 Seri
                    </span>
                  </div>
                </template>
                <!-- Tombol lanjut main jika masih playing -->
                <button x-show="c.status === 'playing'"
                        @click="navigate('/play/' + c.quiz_id + '?mode=challenge&cid=' + c.id)"
                        class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-lg transition-colors">
                  ▶ Lanjut Main
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- ===== TANTANGAN KELUAR ===== -->
    <div>
      <h2 class="text-base font-semibold text-gray-700 dark:text-gray-300 mb-3">📤 Tantangan Terkirim</h2>

      <div x-show="challenge.outgoing.length === 0" class="text-center py-10 text-gray-400 bg-gray-50 dark:bg-gray-800/50 rounded-2xl">
        <p class="text-3xl mb-2">📮</p>
        <p class="text-sm">Belum pernah menantang siapapun</p>
        <button @click="navigate('/quizzes')" class="mt-3 btn-primary text-sm px-5 py-2">Cari Quiz untuk Ditantangkan →</button>
      </div>

      <div class="space-y-3">
        <template x-for="c in challenge.outgoing" :key="c.id">
          <div class="card p-5">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span class="w-7 h-7 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 flex items-center justify-center text-xs font-bold flex-shrink-0"
                        x-text="c.challenged_name.charAt(0).toUpperCase()"></span>
                  <p class="text-sm font-semibold text-gray-900 dark:text-white truncate" x-text="c.challenged_name"></p>
                </div>
                <p class="text-sm font-medium text-gray-600 dark:text-gray-400 mb-2" x-text="'🎯 ' + c.quiz_title"></p>
                <p class="text-xs text-gray-400"
                   x-text="new Date(c.created_at).toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'})"></p>
              </div>
              <div class="flex-shrink-0 text-right">
                <!-- Status badges -->
                <span x-show="c.status === 'pending'"
                      class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-400">
                  ⏳ Menunggu
                </span>
                <span x-show="c.status === 'playing'"
                      class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400">
                  🎮 Berlangsung
                </span>
                <span x-show="c.status === 'declined'"
                      class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400">
                  ❌ Ditolak
                </span>
                <span x-show="c.status === 'expired'"
                      class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-500 dark:bg-gray-800 dark:text-gray-400">
                  ⌛ Kedaluwarsa
                </span>
                <div x-show="c.status === 'completed'" class="text-right">
                  <span x-show="c.winner_name"
                        class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold"
                        :class="c.winner_name === user?.name
                          ? 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400'
                          : 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400'"
                        x-text="c.winner_name === user?.name ? '🏆 Kamu Menang!' : '😔 ' + c.winner_name + ' Menang'">
                  </span>
                  <span x-show="!c.winner_name"
                        class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400">
                    🤝 Seri
                  </span>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

  </div>
</div>
