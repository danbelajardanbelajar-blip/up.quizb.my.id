<div x-show="!admin.loading && true" class="animate-fade-in">
    <div class="flex items-center gap-3 mb-4 flex-wrap">
      <div class="relative flex-1 min-w-[200px] max-w-sm">
        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400 pointer-events-none">🔍</span>
        <input type="search"
               :value="admin.review.search"
               @input="onAdminReviewSearch($event.target.value)"
               placeholder="Cari nama quiz..."
               class="form-input pl-9 py-2 text-sm w-full" />
      </div>
      <p class="text-sm text-gray-500 dark:text-gray-400 whitespace-nowrap flex-shrink-0"
         x-text="reviewFilteredTotal() + ' quiz'"></p>
      <button @click="loadAdminTab('review')" class="text-xs text-primary-600 dark:text-primary-400 hover:underline flex items-center gap-1 flex-shrink-0">↻ Refresh</button>
    </div>

    <div class="card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="data-table">
          <thead><tr>
            <th @click="sortAdmin('review','title')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800">
              Nama Quiz <span class="text-gray-400 text-xs" x-text="sortIcon('review','title')"></span>
            </th>
            <th @click="sortAdmin('review','total_plays')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800 text-right">
              Dimainkan <span class="text-gray-400 text-xs" x-text="sortIcon('review','total_plays')"></span>
            </th>
            <th @click="sortAdmin('review','total_wrong')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800 text-right">
              Jawaban Salah <span class="text-gray-400 text-xs" x-text="sortIcon('review','total_wrong')"></span>
            </th>
            <th @click="sortAdmin('review','error_pct')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800 text-right">
              % Kesalahan <span class="text-gray-400 text-xs" x-text="sortIcon('review','error_pct')"></span>
            </th>
            <th @click="sortAdmin('review','avg_score')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800 text-right">
              Rata-rata Nilai <span class="text-gray-400 text-xs" x-text="sortIcon('review','avg_score')"></span>
            </th>
            <th @click="sortAdmin('review','difficulty_ratio')" class="cursor-pointer select-none hover:bg-gray-50 dark:hover:bg-gray-800 text-right">
              Rasio Kesulitan <span class="text-gray-400 text-xs" x-text="sortIcon('review','difficulty_ratio')"></span>
            </th>
            <th class="text-center">Review</th>
          </tr></thead>

          <!-- One <tbody> per quiz item (Alpine x-for on tbody = valid HTML, supports 2 rows/item) -->
          <template x-for="item in filteredReview()" :key="item.id">
            <tbody>
              <!-- Main row -->
              <tr class="cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors"
                  @click="toggleReviewExpand(item.id)">
                <td>
                  <div class="flex items-center gap-2">
                    <span class="inline-block text-gray-400 text-xs transition-transform duration-200"
                          :style="admin.review.expandedId === item.id ? 'transform:rotate(90deg)' : ''">▶</span>
                    <div>
                      <p class="font-medium text-gray-800 dark:text-gray-100 text-sm" x-text="item.title"></p>
                      <p class="text-xs text-gray-400" x-text="item.difficulty_label"></p>
                    </div>
                  </div>
                </td>
                <td class="text-right tabular-nums" x-text="(item.total_plays || 0).toLocaleString()"></td>
                <td class="text-right tabular-nums" x-text="(item.total_wrong || 0).toLocaleString()"></td>
                <td class="text-right">
                  <span class="badge text-xs font-semibold"
                        :class="item.error_pct >= 70 ? 'badge-danger' : item.error_pct >= 40 ? 'badge-warning' : 'badge-success'"
                        x-text="item.error_pct + '%'"></span>
                </td>
                <td class="text-right">
                  <span class="font-semibold tabular-nums text-sm"
                        :class="item.avg_score >= 70 ? 'text-green-600 dark:text-green-400' : item.avg_score >= 50 ? 'text-yellow-500' : 'text-red-500 dark:text-red-400'"
                        x-text="item.avg_score != null ? item.avg_score + '%' : '—'"></span>
                </td>
                <td class="text-right">
                  <div class="flex items-center justify-end gap-2">
                    <div class="w-16 h-1.5 rounded-full bg-gray-200 dark:bg-gray-700 overflow-hidden">
                      <div class="h-full rounded-full"
                           :class="item.difficulty_ratio >= 0.7 ? 'bg-red-500' : item.difficulty_ratio >= 0.4 ? 'bg-yellow-500' : 'bg-green-500'"
                           :style="'width:' + Math.min(100, Math.round((item.difficulty_ratio||0) * 100)) + '%'"></div>
                    </div>
                    <span class="text-xs tabular-nums text-gray-500"
                          x-text="((item.difficulty_ratio||0) * 100).toFixed(0) + '%'"></span>
                  </div>
                </td>
                <td class="text-center">
                  <button @click.stop="toggleReviewExpand(item.id)"
                          class="text-xs px-3 py-1 rounded-lg transition-colors font-medium"
                          :class="admin.review.expandedId === item.id
                            ? 'bg-primary-100 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300'
                            : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700'"
                          x-text="admin.review.expandedId === item.id ? '▲ Tutup' : '▼ Lihat'">
                  </button>
                </td>
              </tr>

              <!-- Expanded row: attempt history -->
              <tr x-show="admin.review.expandedId === item.id">
                <td colspan="7" class="p-0 border-t-0">
                  <div class="bg-gray-50 dark:bg-gray-800/60 border-t border-b border-gray-100 dark:border-gray-700 px-5 py-4">

                    <!-- Loading -->
                    <div x-show="!admin.review.attempts[item.id]"
                         class="flex items-center gap-2 py-2 text-sm text-gray-400">
                      <div class="w-4 h-4 border-2 border-gray-300 border-t-primary-500 rounded-full animate-spin"></div>
                      Memuat riwayat...
                    </div>

                    <!-- Attempts data -->
                    <div x-show="admin.review.attempts[item.id]">
                      <div class="flex items-center justify-between mb-3">
                        <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Riwayat Percobaan</p>
                        <p class="text-xs text-gray-400"
                           x-text="(admin.review.attempts[item.id]?.total||0) > 10
                             ? 'Menampilkan 10 dari ' + admin.review.attempts[item.id]?.total + ' percobaan'
                             : (admin.review.attempts[item.id]?.data?.length || 0) + ' percobaan'"></p>
                      </div>

                      <div class="overflow-x-auto rounded-xl border border-gray-200 dark:border-gray-700">
                        <table class="w-full text-sm">
                          <thead>
                            <tr class="bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800">
                              <th class="text-left px-4 py-2.5 text-xs font-semibold text-gray-500 dark:text-gray-400">Pemain</th>
                              <th class="text-left px-4 py-2.5 text-xs font-semibold text-gray-500 dark:text-gray-400">Mode</th>
                              <th class="text-right px-4 py-2.5 text-xs font-semibold text-gray-500 dark:text-gray-400">Skor</th>
                              <th class="text-right px-4 py-2.5 text-xs font-semibold text-gray-500 dark:text-gray-400">Benar</th>
                              <th class="text-right px-4 py-2.5 text-xs font-semibold text-gray-500 dark:text-gray-400">Waktu</th>
                              <th class="text-right px-4 py-2.5 text-xs font-semibold text-gray-500 dark:text-gray-400">Tanggal</th>
                            </tr>
                          </thead>
                          <tbody>
                            <template x-for="att in (admin.review.attempts[item.id]?.data || [])" :key="att.id">
                              <tr class="border-b border-gray-50 dark:border-gray-800 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800/50">
                                <td class="px-4 py-2.5">
                                  <span class="text-sm font-medium text-gray-800 dark:text-gray-200"
                                        x-text="att.user_name || '—'"></span>
                                </td>
                                <td class="px-4 py-2.5">
                                  <span class="badge text-xs"
                                        :class="{
                                          'badge-primary': att.mode === 'exam',
                                          'badge-success': att.mode === 'instant',
                                          'badge-warning': att.mode === 'end',
                                          'badge-danger': att.mode === 'challenge'
                                        }"
                                        x-text="{exam:'Ujian',instant:'Instan',end:'Akhir',challenge:'Tantangan'}[att.mode] || att.mode || '—'"></span>
                                </td>
                                <td class="px-4 py-2.5 text-right">
                                  <span class="font-semibold tabular-nums"
                                        :class="att.score >= 60 ? 'text-green-600 dark:text-green-400' : 'text-red-500 dark:text-red-400'"
                                        x-text="att.score + '%'"></span>
                                </td>
                                <td class="px-4 py-2.5 text-right tabular-nums text-gray-600 dark:text-gray-300"
                                    x-text="att.correct_count != null ? att.correct_count : '—'"></td>
                                <td class="px-4 py-2.5 text-right tabular-nums text-gray-500 text-xs"
                                    x-text="att.time_taken ? Math.floor(att.time_taken/60) + 'm ' + (att.time_taken%60) + 's' : '—'"></td>
                                <td class="px-4 py-2.5 text-right text-xs text-gray-400"
                                    x-text="formatDateTime(att.completed_at)"></td>
                              </tr>
                            </template>
                            <tr x-show="(admin.review.attempts[item.id]?.data || []).length === 0">
                              <td colspan="6" class="px-4 py-6 text-center text-xs text-gray-400">Belum ada percobaan</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>

                      <!-- Pagination -->
                      <div x-show="(admin.review.attempts[item.id]?.total||0) > 10"
                           class="flex items-center justify-center gap-2 mt-3">
                        <button @click="loadReviewAttempts(item.id, Math.max(1, (admin.review.attempts[item.id]?.page||1) - 1))"
                                :disabled="(admin.review.attempts[item.id]?.page||1) <= 1"
                                class="px-3 py-1 text-xs rounded-lg border border-gray-200 dark:border-gray-700 disabled:opacity-40 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">← Prev</button>
                        <span class="text-xs text-gray-400"
                              x-text="'Hal. ' + (admin.review.attempts[item.id]?.page||1) + ' / ' + Math.ceil((admin.review.attempts[item.id]?.total||1)/10)"></span>
                        <button @click="loadReviewAttempts(item.id, (admin.review.attempts[item.id]?.page||1) + 1)"
                                :disabled="(admin.review.attempts[item.id]?.page||1) * 10 >= (admin.review.attempts[item.id]?.total||0)"
                                class="px-3 py-1 text-xs rounded-lg border border-gray-200 dark:border-gray-700 disabled:opacity-40 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Next →</button>
                      </div>
                    </div>
                  </div>
                </td>
              </tr>
            </tbody>
          </template>
        </table>
      </div>

      <!-- Empty state -->
      <div x-show="admin.review.data.length === 0 && !admin.loading" class="text-center py-16 text-gray-400">
        <p class="text-4xl mb-3">🔍</p>
        <p class="text-sm">Belum ada data review soal</p>
      </div>
      <div x-show="admin.review.data.length > 0 && reviewFilteredTotal() === 0" class="text-center py-16 text-gray-400">
        <p class="text-4xl mb-2">🔍</p>
        <p class="text-sm">Tidak ada quiz yang cocok dengan "<span x-text="admin.review.search" class="font-medium text-gray-600 dark:text-gray-300"></span>"</p>
      </div>
    </div>
    <!-- Pagination review -->
    <div x-show="reviewFilteredTotal() > admin.review.perPage" class="flex items-center justify-center gap-2 mt-5">
      <button @click="admin.review.page--"
              :disabled="admin.review.page <= 1"
              class="px-4 py-2 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 transition-colors">← Prev</button>
      <span class="text-sm text-gray-500 dark:text-gray-400 px-3"
            x-text="'Halaman ' + admin.review.page + ' dari ' + Math.max(1, Math.ceil(reviewFilteredTotal() / admin.review.perPage))"></span>
      <button @click="admin.review.page++"
              :disabled="admin.review.page * admin.review.perPage >= reviewFilteredTotal()"
              class="px-4 py-2 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 transition-colors">Next →</button>
    </div>
  </div>

  <!-- ===== ANALISIS SOAL TAB ===== -->
