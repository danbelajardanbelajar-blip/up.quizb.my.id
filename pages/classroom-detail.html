<!-- CLASSROOM DETAIL PAGE -->
<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

  <!-- Loading -->
  <div x-show="classroom.detailLoading" class="space-y-6">
    <div class="flex items-center gap-4">
      <div class="skeleton w-16 h-16 rounded-2xl"></div>
      <div class="space-y-2 flex-1">
        <div class="skeleton h-7 w-1/3 rounded"></div>
        <div class="skeleton h-4 w-1/2 rounded"></div>
      </div>
    </div>
    <div class="grid sm:grid-cols-3 gap-4">
      <template x-for="i in 3"><div class="skeleton h-24 rounded-xl"></div></template>
    </div>
  </div>

  <!-- Content -->
  <div x-show="!classroom.detailLoading && classroom.detail" class="animate-fade-in">
    <template x-if="classroom.detail">
      <div>

        <!-- Breadcrumb -->
        <nav class="flex items-center gap-2 text-sm text-gray-400 mb-6">
          <button @click="navigate('/classroom')" class="hover:text-primary-500 transition-colors">🏫 Kelas Saya</button>
          <span>/</span>
          <span class="text-gray-700 dark:text-gray-300 font-medium" x-text="classroom.detail.name"></span>
        </nav>

        <!-- Header -->
        <div class="card p-6 mb-6">
          <div class="flex items-start justify-between flex-wrap gap-4">
            <div class="flex items-center gap-4">
              <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center text-white font-bold text-2xl shadow-lg">
                <span x-text="classroom.detail.name.charAt(0).toUpperCase()"></span>
              </div>
              <div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white" x-text="classroom.detail.name"></h1>
                <p class="text-gray-500 dark:text-gray-400 mt-0.5" x-text="classroom.detail.description || 'Tidak ada deskripsi'"></p>
                <div class="flex items-center gap-3 mt-2 text-sm text-gray-400">
                  <span>Pengajar: <span class="font-medium text-gray-600 dark:text-gray-300" x-text="classroom.detail.teacher_name"></span></span>
                  <span x-show="classroom.isTeacher" class="px-2 py-0.5 bg-primary-100 dark:bg-primary-900/40 text-primary-600 dark:text-primary-400 rounded-full text-xs font-semibold">Anda Pengajar</span>
                </div>
                
                </div>
            </div>
            <!-- Tombol Keluar Kelas (pelajar saja) -->
            <template x-if="!classroom.isTeacher">
              <button @click="classroom.leaveModal = { show: true, loading: false, error: '' }"
                      class="flex items-center gap-2 px-4 py-2 rounded-xl border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 text-sm font-medium transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Keluar Kelas
              </button>
            </template>

            <!-- Join Code + Export (for teacher) -->
            <div x-show="classroom.isTeacher" class="flex flex-col items-end gap-2">
              <div class="px-4 py-2 bg-gray-100 dark:bg-gray-800 rounded-xl text-center">
                <div class="text-xs text-gray-400 mb-1">Kode Join Kelas</div>
                <div class="font-mono font-bold text-xl text-primary-600 dark:text-primary-400 tracking-widest" x-text="classroom.detail.join_code"></div>
              </div>
              <p class="text-xs text-gray-400">Bagikan kode ini ke siswa</p>
              <button @click="exportClassroomToExcel(classroom.detail.id)"
                      class="flex items-center gap-2 px-4 py-2 rounded-xl bg-green-600 hover:bg-green-700 text-white text-sm font-semibold shadow transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Export Nilai Excel
              </button>
            </div>
          </div>

          <!-- Stats -->
          <div class="grid grid-cols-3 gap-4 mt-6 pt-5 border-t border-gray-100 dark:border-gray-800">
            <div class="text-center">
              <div class="text-2xl font-bold text-gray-800 dark:text-gray-100" x-text="classroom.members.length"></div>
              <div class="text-xs text-gray-400 mt-0.5">Anggota</div>
            </div>
            <div class="text-center">
              <div class="text-2xl font-bold text-gray-800 dark:text-gray-100" x-text="classroom.assignments.length"></div>
              <div class="text-xs text-gray-400 mt-0.5">Tugas</div>
            </div>
            <div class="text-center">
              <div class="text-2xl font-bold text-gray-800 dark:text-gray-100">
                <span :class="classroom.detail.is_active ? 'text-green-500' : 'text-gray-400'" x-text="classroom.detail.is_active ? '✓' : '✗'"></span>
              </div>
              <div class="text-xs text-gray-400 mt-0.5" x-text="classroom.detail.is_active ? 'Aktif' : 'Nonaktif'"></div>
            </div>
          </div>
        </div>

        <!-- Two Column Layout -->
        <div class="grid lg:grid-cols-5 gap-6">

          <!-- Left: Assignments (3/5) -->
          <div class="lg:col-span-3 space-y-4">
            <div class="flex items-center justify-between">
              <h2 class="font-bold text-lg text-gray-900 dark:text-white">📋 Tugas</h2>
              <button x-show="classroom.isTeacher" @click="openAssignModal()"
                      class="btn-primary text-sm px-4 py-2">+ Buat Tugas</button>
            </div>

            <!-- Loading skeleton -->
            <div x-show="classroom.detailLoading" class="space-y-3">
              <template x-for="i in 3"><div class="skeleton h-20 rounded-xl"></div></template>
            </div>

            <!-- Assignment list -->
            <div x-show="!classroom.detailLoading && classroom.assignments.length > 0" class="space-y-3">
              <template x-for="assign in classroom.assignments" :key="assign.id">
                <div class="card p-4">
                  <div class="flex items-start justify-between gap-3">
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-2 mb-1">
                        <span class="font-semibold text-gray-800 dark:text-gray-100 truncate" x-text="assign.title"></span>
                        <span class="badge text-xs px-2 py-0.5 rounded-full"
                              :class="assign.mode === 'exam' ? 'badge-danger' : assign.mode === 'instant' ? 'badge-warning' : 'badge-primary'"
                              x-text="{ bebas: 'Bebas', instant: 'Instan', end: 'Akhir', exam: 'Ujian' }[assign.mode] || assign.mode"></span>
                        <template x-if="assign.status === 'done'">
                          <span class="inline-flex items-center gap-2 ml-2 text-xs">
                            <span class="w-5 h-5 flex items-center justify-center rounded-md bg-green-500 text-white">
                              <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414L8.414 15l-4.121-4.121a1 1 0 011.414-1.414L8.414 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                            </span>
                            <span class="bg-green-50 text-green-700 px-2 py-0.5 rounded-full">Selesai</span>
                          </span>
                        </template>
                        <template x-if="assign.status === 'incomplete'">
                          <span class="inline-flex items-center gap-2 ml-2 text-xs">
                            <span class="w-5 h-5 flex items-center justify-center rounded-md bg-yellow-300 text-yellow-900">⚠️</span>
                            <span class="bg-yellow-50 text-yellow-800 px-2 py-0.5 rounded-full">Belum Selesai</span>
                          </span>
                        </template>
                        <template x-if="assign.status === 'overdue'">
                          <span class="inline-flex items-center gap-2 ml-2 text-xs">
                            <span class="w-5 h-5 flex items-center justify-center rounded-md bg-red-100 text-red-600">⏰</span>
                            <span class="bg-red-50 text-red-600 px-2 py-0.5 rounded-full">Lewat Waktu</span>
                          </span>
                        </template>
                      </div>
                      <p class="text-sm text-gray-500 dark:text-gray-400">
                        <template x-if="assign.quiz_packages && assign.quiz_packages.length > 0">
                          <span>
                            📝
                            <template x-for="(pkg, idx) in assign.quiz_packages" :key="pkg.id">
                              <span><span x-text="pkg.title"></span><span x-show="idx < assign.quiz_packages.length - 1">, </span></span>
                            </template>
                            •
                            <span class="font-medium text-primary-600 dark:text-primary-400" x-text="assign.max_questions ? assign.max_questions + ' soal (diatur guru)' : assign.total_questions + ' soal (bank soal)'"></span>
                          </span>
                        </template>
                        <template x-if="!assign.quiz_packages || assign.quiz_packages.length === 0">
                          <span>
                            📝 <span x-text="assign.quiz_title"></span>
                            •
                            <span class="font-medium text-primary-600 dark:text-primary-400" x-text="assign.max_questions ? assign.max_questions + ' soal (diatur guru)' : assign.total_questions + ' soal (bank soal)'"></span>
                          </span>
                        </template>
                      </p>
                      <div class="flex flex-wrap items-center gap-2 text-xs text-gray-400 mt-1">
                        <span x-show="assign.deadline">⏰ <span x-text="formatDate(assign.deadline)"></span></span>
                        <span x-show="classroom.isTeacher">👥 <span x-text="assign.submission_count || 0"></span> dikumpulkan</span>
                        <template x-if="!classroom.isTeacher">
                          <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-500"><span x-show="assign.my_score !== null">Skor kamu: <strong x-text="assign.my_score + '%'" class="text-primary-600"></strong></span></span>
                            <button @click.prevent="openAssignmentAttempts(assign.id)" class="ml-2 text-xs text-primary-600 hover:underline">📜 Riwayat</button>
                          </div>
                        </template>
                        <template x-if="assign.shuffle_questions !== null">
                          <span :class="assign.shuffle_questions ? 'text-green-500' : 'text-gray-400'"
                                x-text="assign.shuffle_questions ? '🔀 soal acak' : '↕ soal berurutan'"></span>
                        </template>
                        <template x-if="assign.shuffle_options !== null">
                          <span :class="assign.shuffle_options ? 'text-green-500' : 'text-gray-400'"
                                x-text="assign.shuffle_options ? '🔀 jawaban acak' : '↕ jawaban berurutan'"></span>
                        </template>
                      </div>
                    </div>
                    <div class="flex gap-2 flex-shrink-0">
                      <!-- For students: play button -->
                      <template x-if="!classroom.isTeacher">
                        <button @click="(() => {
                                  const hasMultiPkg = assign.quiz_packages && assign.quiz_packages.length > 1;
                                  const qid = (assign.quiz_packages && assign.quiz_packages.length > 0)
                                    ? assign.quiz_packages[0].quiz_id
                                    : assign.quiz_id;
                                  if (assign.mode === 'bebas') navigate('/quiz/' + qid + '?assign=' + assign.id);
                                  else navigate('/play/' + (hasMultiPkg ? '0' : qid) + '?mode=' + assign.mode + '&assign=' + assign.id);
                                })()"
                                class="btn-primary text-xs px-3 py-1.5">Kerjakan</button>
                      </template>
                      <!-- For teachers: hasil, live, edit, delete -->
                      <template x-if="classroom.isTeacher">
                        <div class="flex flex-wrap gap-2">
                          <button @click="navigate('/assignment/' + assign.id + '/results')"
                                  class="text-xs text-green-600 dark:text-green-400 hover:underline px-2 py-1.5">📊 Hasil</button>
                          <button @click="navigate('/assignment/' + assign.id + '/monitor')"
                                  class="text-xs text-red-500 hover:underline px-2 py-1.5">🔴 Live</button>
                          <button @click="openEditAssignModal(assign)"
                                  class="text-xs text-primary-500 hover:underline px-2 py-1.5">✏️ Edit</button>
                          <button @click="deleteAssignment(assign.id, classroom.detail.id)"
                                  class="text-xs text-red-500 hover:underline px-2 py-1.5">Hapus</button>
                        </div>
                      </template>

                  <!-- Assignment Attempts Modal (student) -->
                  <div x-show="dashboardAttemptModal.show" @click.self="closeAssignmentAttempts()" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none">
                    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden">
                      <div class="flex items-center justify-between p-4 border-b border-gray-100 dark:border-gray-800">
                        <div>
                          <h3 class="font-bold text-lg text-gray-900 dark:text-white" x-text="dashboardAttemptModal.assignment ? dashboardAttemptModal.assignment.title : 'Percobaan'">Percobaan</h3>
                          <p class="text-xs text-gray-400" x-text="dashboardAttemptModal.assignment ? dashboardAttemptModal.assignment.class_name : ''"></p>
                        </div>
                        <button @click="closeAssignmentAttempts()" class="text-gray-400 hover:text-gray-600">&times;</button>
                      </div>
                      <div class="p-4">
                        <div x-show="dashboardAttemptModal.loading" class="text-center py-6">
                          <div class="w-10 h-10 border-4 border-primary-200 border-t-primary-600 rounded-full animate-spin mx-auto mb-3"></div>
                          <div class="text-sm text-gray-500">Memuat percobaan…</div>
                        </div>
                        <div x-show="!dashboardAttemptModal.loading">
                          <div x-show="dashboardAttemptModal.error" class="text-red-500 text-sm mb-3" x-text="dashboardAttemptModal.error"></div>
                          <div x-show="dashboardAttemptModal.attempts.length === 0" class="text-center text-gray-400 py-6">
                            <p class="text-lg">Belum ada percobaan untuk quiz ini</p>
                          </div>
                          <div x-show="dashboardAttemptModal.attempts.length > 0" class="space-y-3">
                            <template x-for="att in dashboardAttemptModal.attempts" :key="att.id">
                              <div class="flex items-center justify-between p-3 rounded-lg border border-gray-100 dark:border-gray-800">
                                <div>
                                  <p class="font-semibold text-gray-800 dark:text-gray-100" x-text="'Skor: ' + (att.score !== null ? att.score + '%' : '-')"></p>
                                  <p class="text-xs text-gray-400" x-text="att.completed_at ? new Date(att.completed_at).toLocaleString('id-ID') : 'Belum selesai'"></p>
                                </div>
                                <div class="text-right">
                                  <p class="text-sm font-bold" x-text="att.correct_count !== null ? att.correct_count + ' benar' : '-' "></p>
                                  <p class="text-xs text-gray-400" x-text="att.time_taken ? (Math.floor(att.time_taken/60) + 'm ' + (att.time_taken%60) + 's') : '-' "></p>
                                </div>
                              </div>
                            </template>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                    </div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Empty assignments -->
            <div x-show="!classroom.detailLoading && classroom.assignments.length === 0"
                 class="card p-8 text-center text-gray-400">
              <p class="text-4xl mb-3">📋</p>
              <p class="text-sm">Belum ada tugas</p>
              <template x-if="classroom.isTeacher">
                <button @click="openAssignModal()" class="mt-3 btn-primary text-sm px-4 py-2">+ Buat Tugas Pertama</button>
              </template>
            </div>
          </div>

          <!-- Right: Members (2/5) -->
          <div class="lg:col-span-2">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-bold text-lg text-gray-900 dark:text-white">👥 Anggota</h2>
              <span class="text-sm text-gray-400" x-text="classroom.members.length + ' orang'"></span>
            </div>

            <div class="card overflow-hidden">
              <template x-for="member in classroom.members" :key="member.id">
                <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100 dark:border-gray-800 last:border-0 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
                  <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0"
                       :style="'background: hsl(' + (member.id * 37 % 360) + ',60%,55%)'">
                    <span x-text="member.name.charAt(0).toUpperCase()"></span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-800 dark:text-gray-100 truncate" x-text="member.name"></p>
                    <p class="text-xs text-gray-400 truncate" x-text="member.email"></p>
                  </div>
                  <!-- Kick button (teacher only) -->
                  <template x-if="classroom.isTeacher">
                    <button @click="kickMember(classroom.detail.id, member.id)"
                            class="text-xs text-red-400 hover:text-red-600 transition-colors flex-shrink-0"
                            title="Keluarkan dari kelas">✕</button>
                  </template>
                </div>
              </template>

              <div x-show="classroom.members.length === 0" class="text-center py-8 text-gray-400">
                <p class="text-2xl mb-2">👤</p>
                <p class="text-sm">Belum ada anggota</p>
              </div>
            </div>
          </div>

        </div>
      </div>
    </template>
  </div>

  <!-- Not found -->
  <div x-show="!classroom.detailLoading && !classroom.detail" class="text-center py-20 text-gray-400">
    <p class="text-5xl mb-4">😕</p>
    <p class="text-lg">Kelas tidak ditemukan</p>
    <button @click="navigate('/classroom')" class="mt-4 btn-primary">← Kembali ke Kelas</button>
  </div>

  <!-- === LEAVE CLASS MODAL (pelajar) === -->
  <template x-if="classroom.leaveModal.show">
  <div @keydown.escape.window="classroom.leaveModal.show=false" class="modal-overlay">
    <div class="modal-box p-6 max-w-sm">
      <div class="flex flex-col items-center text-center mb-5">
        <div class="w-14 h-14 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center mb-3">
          <svg class="w-7 h-7 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </div>
        <h2 class="font-bold text-lg text-gray-900 dark:text-white">Keluar dari Kelas?</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
          Kamu akan keluar dari kelas
          <span class="font-semibold text-gray-800 dark:text-gray-200" x-text='"«" + classroom.detail?.name + "»"'></span>.
          Untuk bergabung lagi, kamu perlu kode join dari pengajar.
        </p>
      </div>
      <div x-show="classroom.leaveModal.error"
           class="mb-3 p-2 bg-red-50 dark:bg-red-900/20 rounded-lg text-sm text-red-600 dark:text-red-400"
           x-text="classroom.leaveModal.error"></div>
      <div class="flex gap-3">
        <button @click="classroom.leaveModal.show=false"
                class="flex-1 py-2 rounded-lg border border-gray-200 dark:border-gray-700 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800">
          Batal
        </button>
        <button @click="leaveClass(classroom.detail.id)"
                class="flex-1 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm font-semibold transition-colors"
                :disabled="classroom.leaveModal.loading">
          <span x-show="classroom.leaveModal.loading"
                class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin inline-block mr-2"></span>
          Ya, Keluar
        </button>
      </div>
    </div>
  </div>
  </template>

  <!-- === CREATE / EDIT ASSIGNMENT MODAL === -->
  <template x-if="classroom.assignModal.show">
  <div @keydown.escape.window="classroom.assignModal.show=false"
       class="modal-overlay" x-transition>
    <div class="modal-box p-6">
      <h2 class="font-bold text-lg text-gray-900 dark:text-white mb-5"
          x-text="classroom.assignModal.editId ? '✏️ Edit Tugas' : '📋 Buat Tugas Baru'"></h2>
      <div class="space-y-4">
        <div>
          <label class="form-label">Judul Tugas *</label>
          <input x-model="classroom.assignForm.title" class="form-input" placeholder="Cth: Latihan Soal Bab 3" />
        </div>
        <!-- Pilih quiz untuk buat baru atau edit -->
        <div>
          <div x-show="!classroom.assignModal.editId">
            <label class="form-label">Pilih Paket Soal (Quiz) * <span class="text-xs text-gray-400">(bisa lebih dari satu)</span></label>
          
          <!-- Multi-select Quiz Packages (Tag Style) -->
          <div class="space-y-2">
            <!-- Selected Tags -->
            <div x-show="classroom.assignForm.quiz_ids.length > 0" class="flex flex-wrap gap-2 p-3 bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 mb-2">
              <template x-for="qid in classroom.assignForm.quiz_ids" :key="qid">
                <div class="inline-flex items-center gap-2 px-3 py-1.5 bg-primary-100 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300 rounded-full text-sm font-medium">
                  <span x-text="classroom.quizListForAssign.find(q => q.id == qid)?.title || 'Quiz ' + qid"></span>
                  <span x-text="'(' + (classroom.quizListForAssign.find(q => q.id == qid)?.question_count || 0) + ' soal)'"></span>
                  <button type="button" @click="classroom.assignForm.quiz_ids = classroom.assignForm.quiz_ids.filter(id => id != qid)"
                          class="ml-1 text-primary-500 hover:text-primary-700 dark:hover:text-primary-200 font-bold">
                    ✕
                  </button>
                </div>
              </template>
            </div>

            <!-- Dropdown untuk menambah quiz -->
            <div class="relative">
              <div x-show="!classroom.assignQuizDropdownOpen" 
                   @click="classroom.assignQuizDropdownOpen = true"
                   class="form-input cursor-pointer bg-white dark:bg-gray-800 flex items-center justify-between">
                <span x-show="classroom.assignForm.quiz_ids.length === 0" class="text-gray-400">-- Pilih dan tambahkan quiz --</span>
                <span x-show="classroom.assignForm.quiz_ids.length > 0" class="text-gray-500">-- Tambahkan quiz lain --</span>
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                </svg>
              </div>

              <!-- Dropdown List -->
              <div x-show="classroom.assignQuizDropdownOpen" 
                   @click.outside="classroom.assignQuizDropdownOpen = false"
                   class="absolute top-full left-0 right-0 mt-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg z-10"
                   x-transition>
                <div class="max-h-60 overflow-y-auto">
                  <template x-for="q in classroom.quizListForAssign" :key="q.id">
                    <div @click="
                      if (!classroom.assignForm.quiz_ids.includes(q.id)) {
                        classroom.assignForm.quiz_ids.push(q.id);
                      }
                      classroom.assignQuizDropdownOpen = false;
                    "
                         :class="classroom.assignForm.quiz_ids.includes(q.id) ? 'bg-primary-50 dark:bg-primary-900/20' : 'hover:bg-gray-50 dark:hover:bg-gray-700'"
                         class="px-4 py-2.5 cursor-pointer border-b border-gray-100 dark:border-gray-700 last:border-0 transition-colors flex items-center justify-between">
                      <div class="flex-1">
                        <p class="font-medium text-gray-800 dark:text-gray-100" x-text="q.title"></p>
                        <p class="text-xs text-gray-500 dark:text-gray-400" x-text="q.question_count + ' soal'"></p>
                      </div>
                      <span x-show="classroom.assignForm.quiz_ids.includes(q.id)" class="text-primary-600 dark:text-primary-400 font-bold">✓</span>
                    </div>
                  </template>
                  
                  <div x-show="!classroom.quizListLoading && classroom.quizListForAssign.length === 0" class="px-4 py-6 text-center text-gray-400 text-sm">
                    Tidak ada paket soal yang tersedia
                  </div>
                  <div x-show="classroom.quizListLoading" class="px-4 py-6 text-center text-gray-400 text-sm">
                    Memuat...
                  </div>
                </div>
              </div>
            </div>

            <p class="text-xs text-gray-400 mt-1.5">
              💡 Tambahkan satu atau lebih paket soal. Soal dari semua paket akan digabung dalam satu tugas.
            </p>
          </div>

          <!-- Untuk edit: tampilkan existing packages -->
          <div x-show="classroom.assignModal.editId" class="space-y-2">
            <label class="form-label">Paket Soal</label>
            <div x-show="classroom.assignForm.quiz_ids.length > 0" class="flex flex-wrap gap-2 p-3 bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
              <template x-for="qid in classroom.assignForm.quiz_ids" :key="qid">
                <div class="inline-flex items-center gap-2 px-3 py-1.5 bg-primary-100 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300 rounded-full text-sm font-medium">
                  <span x-text="classroom.quizListForAssign.find(q => q.id == qid)?.title || 'Quiz ' + qid"></span>
                  <span x-text="'(' + (classroom.quizListForAssign.find(q => q.id == qid)?.question_count || 0) + ' soal)'"></span>
                </div>
              </template>
            </div>
            <p class="text-xs text-gray-400 mt-1">💡 Untuk mengubah paket soal, hubungi administrator atau buat tugas baru.</p>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="form-label">Mode</label>
            <select x-model="classroom.assignForm.mode" class="form-input">
              <option value="bebas">Bebas (review setelah selesai)</option>
              <option value="instant">Instan (langsung tahu benar/salah)</option>
              <option value="end">Akhir (lihat semua di akhir)</option>
              <option value="exam">Ujian (tidak bisa lihat jawaban)</option>
            </select>
          </div>
          <div>
            <label class="form-label">Deadline (opsional)</label>
            <input type="datetime-local" x-model="classroom.assignForm.deadline" class="form-input" />
          </div>
        </div>
        <!-- Jumlah Soal -->
        <div>
          <label class="form-label">🔢 Jumlah Soal yang Ditampilkan</label>
          <div class="flex items-center gap-3">
            <input type="number" x-model.number="classroom.assignForm.max_questions"
                   min="1" max="999"
                   placeholder="Kosongkan = ikuti setting pelajar (default 10)"
                   class="form-input flex-1" />
            <button type="button" @click="classroom.assignForm.max_questions = ''"
                    class="text-xs px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 whitespace-nowrap">
              Reset
            </button>
          </div>
          <p class="text-xs text-gray-400 mt-1.5">
            <span class="text-primary-500 font-medium">Kosongkan</span> → ikuti setting pelajar. &nbsp;
            <span class="text-primary-500 font-medium">Isi angka</span> → paksa semua pelajar mengerjakan soal sebanyak ini.
          </p>
        </div>

        <!-- Shuffle Settings -->
        <div class="border border-gray-100 dark:border-gray-800 rounded-xl p-4 space-y-4">
          <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Pengaturan Acak</p>
          <p class="text-xs text-gray-400 -mt-2">
            <span class="text-primary-500 font-medium">Kosongkan / Ikuti pelajar</span> → pakai setting personal pelajar. &nbsp;
            <span class="font-medium text-green-600">Aktif / Nonaktif</span> → paksa untuk semua pelajar di tugas ini.
          </p>

          <!-- Acak Urutan Soal -->
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1">
              <p class="text-sm font-medium text-gray-800 dark:text-gray-100">🔀 Acak Urutan Soal</p>
              <p class="text-xs text-gray-400 mt-0.5">Tampilkan soal dalam urutan acak setiap sesi.</p>
            </div>
            <!-- 3-state: null = ikuti user, true = paksa acak, false = paksa berurutan -->
            <div class="flex flex-col items-end gap-1">
              <button type="button"
                      @click="classroom.assignForm.shuffle_questions =
                        classroom.assignForm.shuffle_questions === null ? true :
                        classroom.assignForm.shuffle_questions === true  ? false : null"
                      class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200"
                      :class="classroom.assignForm.shuffle_questions === true  ? 'bg-green-500' :
                              classroom.assignForm.shuffle_questions === false ? 'bg-red-400' :
                              'bg-gray-300 dark:bg-gray-600'">
                <span class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow transition duration-200"
                      :class="classroom.assignForm.shuffle_questions === true  ? 'translate-x-5' :
                              classroom.assignForm.shuffle_questions === false ? 'translate-x-0' :
                              'translate-x-2.5'">
                </span>
              </button>
              <span class="text-xs"
                    :class="classroom.assignForm.shuffle_questions === true  ? 'text-green-600 dark:text-green-400' :
                            classroom.assignForm.shuffle_questions === false ? 'text-red-500' :
                            'text-gray-400'"
                    x-text="classroom.assignForm.shuffle_questions === true  ? '✓ Paksa acak' :
                             classroom.assignForm.shuffle_questions === false ? '✗ Paksa berurutan' :
                             '— Ikuti pelajar'">
              </span>
            </div>
          </div>

          <!-- Acak Pilihan Jawaban -->
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1">
              <p class="text-sm font-medium text-gray-800 dark:text-gray-100">🔀 Acak Pilihan Jawaban</p>
              <p class="text-xs text-gray-400 mt-0.5">Acak urutan A/B/C/D untuk setiap soal.</p>
            </div>
            <div class="flex flex-col items-end gap-1">
              <button type="button"
                      @click="classroom.assignForm.shuffle_options =
                        classroom.assignForm.shuffle_options === null ? true :
                        classroom.assignForm.shuffle_options === true  ? false : null"
                      class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200"
                      :class="classroom.assignForm.shuffle_options === true  ? 'bg-green-500' :
                              classroom.assignForm.shuffle_options === false ? 'bg-red-400' :
                              'bg-gray-300 dark:bg-gray-600'">
                <span class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow transition duration-200"
                      :class="classroom.assignForm.shuffle_options === true  ? 'translate-x-5' :
                              classroom.assignForm.shuffle_options === false ? 'translate-x-0' :
                              'translate-x-2.5'">
                </span>
              </button>
              <span class="text-xs"
                    :class="classroom.assignForm.shuffle_options === true  ? 'text-green-600 dark:text-green-400' :
                            classroom.assignForm.shuffle_options === false ? 'text-red-500' :
                            'text-gray-400'"
                    x-text="classroom.assignForm.shuffle_options === true  ? '✓ Paksa acak' :
                             classroom.assignForm.shuffle_options === false ? '✗ Paksa berurutan' :
                             '— Ikuti pelajar'">
              </span>
            </div>
          </div>
        </div>
        <!-- Timer Settings -->
        <div class="border border-gray-100 dark:border-gray-800 rounded-xl p-4 space-y-4">
          <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Pengaturan Timer</p>
          <p class="text-xs text-gray-400 -mt-2">
            <span class="text-primary-500 font-medium">Kosongkan</span> → ikuti setting personal pelajar.
            <span class="font-medium text-green-600">Isi angka</span> → paksa untuk semua pelajar di tugas ini.
          </p>

          <!-- Timer per soal (Instant/End) -->
          <div x-show="classroom.assignForm.mode === 'instant' || classroom.assignForm.mode === 'end' || classroom.assignForm.mode === 'bebas'">
            <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1.5">
              ⚡ Timer per Soal <span class="text-orange-500">(detik)</span>
            </label>
            <p class="text-xs text-gray-400 mb-2">Berlaku untuk Instant &amp; End Review. Kosongkan = ikuti setting pelajar.</p>
            <div class="flex items-center gap-2">
              <input type="number"
                     x-model.number="classroom.assignForm.timer_per_question"
                     min="5" max="300" placeholder="kosong = ikuti pelajar"
                     class="form-input flex-1 text-sm">
              <span class="text-xs text-gray-400 whitespace-nowrap">detik/soal</span>
              <button x-show="classroom.assignForm.timer_per_question"
                      @click="classroom.assignForm.timer_per_question = ''"
                      class="text-xs text-gray-400 hover:text-red-500">✕</button>
            </div>
            <div class="flex gap-1.5 mt-2 flex-wrap">
              <template x-for="p in [10,15,20,30,45,60]">
                <button type="button" @click="classroom.assignForm.timer_per_question = p"
                        class="px-2 py-0.5 text-xs rounded border transition-colors"
                        :class="classroom.assignForm.timer_per_question === p
                          ? 'bg-orange-100 border-orange-400 text-orange-700' : 'border-gray-200 dark:border-gray-700 text-gray-400'">
                  <span x-text="p+'s'"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Timer total ujian (Exam) -->
          <div x-show="classroom.assignForm.mode === 'exam' || classroom.assignForm.mode === 'bebas'">
            <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1.5">
              🎯 Timer Total Ujian <span class="text-blue-500">(menit)</span>
            </label>
            <p class="text-xs text-gray-400 mb-2">Berlaku untuk Mode Ujian. Kosongkan = ikuti setting pelajar / durasi quiz.</p>
            <div class="flex items-center gap-2">
              <input type="number"
                     x-model.number="classroom.assignForm.duration_minutes"
                     min="1" max="180" placeholder="kosong = ikuti pelajar"
                     class="form-input flex-1 text-sm">
              <span class="text-xs text-gray-400 whitespace-nowrap">menit</span>
              <button x-show="classroom.assignForm.duration_minutes"
                      @click="classroom.assignForm.duration_minutes = ''"
                      class="text-xs text-gray-400 hover:text-red-500">✕</button>
            </div>
            <div class="flex gap-1.5 mt-2 flex-wrap">
              <template x-for="p in [10,15,20,30,45,60,90]">
                <button type="button" @click="classroom.assignForm.duration_minutes = p"
                        class="px-2 py-0.5 text-xs rounded border transition-colors"
                        :class="classroom.assignForm.duration_minutes === p
                          ? 'bg-blue-100 border-blue-400 text-blue-700' : 'border-gray-200 dark:border-gray-700 text-gray-400'">
                  <span x-text="p+' mnt'"></span>
                </button>
              </template>
            </div>
          </div>
        </div>
        <!-- Require full score option (per-assignment) -->
        <div class="border border-gray-100 dark:border-gray-800 rounded-xl p-4">
          <label class="form-label mb-3">Harus dikerjakan sampai 100</label>
          <div class="flex items-center gap-3">
            <input type="checkbox" id="assign_require_full_score" x-model="classroom.assignForm.require_full_score" class="form-checkbox" />
            <label for="assign_require_full_score" class="text-sm text-gray-500 dark:text-gray-400">Jika dicentang, tugas hanya dianggap selesai jika skor 100%</label>
          </div>
        </div>
      </div>
      <div x-show="classroom.assignError" class="mt-3 p-2 bg-red-50 dark:bg-red-900/20 rounded-lg text-sm text-red-600 dark:text-red-400" x-text="classroom.assignError"></div>
      <div class="flex gap-3 mt-6">
        <button @click="classroom.assignModal.show=false" class="flex-1 py-2 rounded-lg border border-gray-200 dark:border-gray-700 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800">Batal</button>
        <template x-if="!classroom.assignModal.editId">
          <button @click="createAssignment(classroom.detail?.id)" class="flex-1 btn-primary py-2" :disabled="classroom.assignLoading">
            <span x-show="classroom.assignLoading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin inline-block mr-2"></span>
            Buat Tugas
          </button>
        </template>
        <template x-if="classroom.assignModal.editId">
          <button @click="updateAssignment(classroom.detail?.id)" class="flex-1 btn-primary py-2" :disabled="classroom.assignLoading">
            <span x-show="classroom.assignLoading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin inline-block mr-2"></span>
            Simpan Perubahan
          </button>
        </template>
      </div>
    </div>
  </div>
  </template>

</div>
